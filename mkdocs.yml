site_name: Laravel ABAC
site_description: Attribute-Based Access Control for Laravel
site_url: https://zennit-dev.github.io/abac/

docs_dir: docs

# Note: MkDocs 2.0 warning from Material for MkDocs is a known tooling issue
# See: https://squidfunk.github.io/mkdocs-material/blog/2026/02/18/mkdocs-2.0/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js

nav:
  - Home: index.md
  - Consumer Setup: CONSUMER_SETUP.md
  - Managing Permissions: MANAGING_ABAC.md
  - Seeding Schema: SEEDING_SCHEMA.md
  - Architecture Diagrams: ARCHITECTURE_DIAGRAMS.md
  - Operations: OPERATIONS.md
  - Benchmarking: BENCHMARKING.md
  - Security Model: SECURITY_MODEL.md
  - Governance: GOVERNANCE.md
